# doc SECURITY.md Load Balancing: this is real nginx config, matching
# doc 18's stateless-service architecture (any backend pod can serve any
# request — no session affinity required because WebSocket state lives in
# Redis pub/sub, not in-process). Not verified by an actual nginx binary in
# this environment — same "real but unverified infra config" status as
# Stage 12's Tauri Rust source.

upstream edina_backend {
    # doc 18: least_conn suits a mix of short REST calls and longer-lived
    # WebSocket connections better than round-robin — a node already
    # holding several WebSocket connections shouldn't also get the next
    # REST request by blind rotation.
    least_conn;
    server backend-1:3000 max_fails=3 fail_timeout=30s;
    server backend-2:3000 max_fails=3 fail_timeout=30s;
    server backend-3:3000 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen 443 ssl http2;
    server_name api.edina.ua;

    ssl_certificate     /etc/nginx/certs/edina.ua.crt;
    ssl_certificate_key /etc/nginx/certs/edina.ua.key;
    ssl_protocols TLSv1.3 TLSv1.2; # doc 31: TLS 1.3 minimum, 1.2 fallback only

    # doc SECURITY.md DDoS Protection: connection/request-rate limiting at
    # the edge, ahead of the application's own doc 31 rate-limit tiers —
    # defense in depth, not a replacement for ThrottlerModule.
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn conn_limit 20;
    limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;
    limit_req zone=req_limit burst=20 nodelay;

    client_max_body_size 25m; # doc 46: matches the free-tier upload cap; premium-tier larger uploads go direct-to-R2, not through this proxy

    location /socket.io/ {
        # doc 18: WebSocket upgrade — long-lived connections need the
        # upgrade headers and a much longer proxy timeout than a normal
        # REST call.
        proxy_pass http://edina_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location /webhooks/ {
        # doc PAYMENTS.md: Stripe/Apple/Google webhooks need the raw body
        # untouched — no request buffering/transformation here.
        proxy_pass http://edina_backend;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://edina_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://edina_backend;
        access_log off; # doc 37: high-frequency LB health probes shouldn't flood access logs
    }
}
