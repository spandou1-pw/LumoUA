version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edina
      POSTGRES_PASSWORD: edina_local_dev_only
      POSTGRES_DB: edina_dev
    ports:
      - '5432:5432'
    volumes:
      - edina_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  # Elasticsearch (doc 29) — included for completeness; not required until
  # the search module (a later milestone, doc 50) is implemented.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'

volumes:
  edina_pg_data:
